name: Portfolio API CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  APP_DIR: "~/portfolio/mydeployaztu"
  SERVICE_NAME: "portfolio-api"

jobs:
  # ==========================================
  # 1) LINT — Kod keyfiyyəti yoxlanışı
  # ==========================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run Ruff (linter)
        run: ruff check . || true

      - name: Run Black (format check)
        run: black --check . || true

  # ==========================================
  # 2) TEST — Pytest ilə CRUD testləri
  # ==========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run pytest
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "⚠️  Test qovluğu yoxdur, keçilir"
          fi

      - name: Import smoke test
        run: python -c "from main import app; print('✅ App import OK')"

  # ==========================================
  # 3) DEPLOY — Yalnız main-ə push-dan sonra
  # ==========================================
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.SERVER_IP }}/docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            echo "🚀 Deploy başladı: $(date)"

            cd ~/portfolio/mydeployaztu

            echo "📦 DB backup..."
            if [ -f "db.json" ]; then
              cp db.json "db.json.backup.$(date +%Y%m%d_%H%M%S)"
              ls -t db.json.backup.* 2>/dev/null | tail -n +6 | xargs -r rm
            fi

            echo "⬇️  Git pull..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐍 Python virtualenv..."
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            echo "📚 Dependencies..."
            ./venv/bin/pip install --upgrade pip --quiet
            ./venv/bin/pip install -r requirements.txt --quiet

            echo "⚙️  Systemd service yenilənir..."
            sudo cp portfolio-api.service /etc/systemd/system/portfolio-api.service
            sudo systemctl daemon-reload
            sudo systemctl enable portfolio-api

            echo "🔄 Servisləri restart..."
            sudo systemctl restart portfolio-api
            sleep 3
            sudo systemctl restart nginx

            echo "❤️  Health check..."
            for i in 1 2 3 4 5; do
              if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
                echo "✅ API cavab verir (cəhd $i)"
                break
              fi
              echo "⏳ Gözləmə... ($i/5)"
              sleep 2
              if [ $i -eq 5 ]; then
                echo "❌ API cavab vermir!"
                sudo systemctl status portfolio-api --no-pager
                exit 1
              fi
            done

            echo "📊 Servis statusu:"
            sudo systemctl is-active portfolio-api
            sudo systemctl is-active nginx

            echo "✅ Deploy tamamlandı: $(date)"

  # ==========================================
  # 4) NOTIFY — Deploy nəticəsi
  # ==========================================
  notify:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy result
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy uğurlu — http://${{ secrets.SERVER_IP }}/docs"
          else
            echo "❌ Deploy uğursuz — log-a bax"
            exit 1
          fi
